general {
    lock_cmd = omarchy-theme-bg-next; omarchy-system-lock  # cycle background then lock
    before_sleep_cmd = omarchy-theme-bg-next; OMARCHY_LOCK_ONLY=true omarchy-system-lock  # cycle background before sleep lock
    after_sleep_cmd = sleep 1 && omarchy-system-wake                 # delay for PAM readiness, then turn on display.
    inhibit_sleep = 3                                      # wait until screen is locked
}

# Start screensaver after 30 minutes
listener {
    timeout = 1800
    on-timeout = pidof hyprlock || omarchy-launch-screensaver
}

# Lock system after 7.5 hours post-screensaver (8 hours total from last activity)
listener {
    timeout = 27000
    on-timeout = omarchy-system-lock
    on-resume = omarchy-system-wake
}
